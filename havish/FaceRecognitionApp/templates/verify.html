{% extends "base.html" %}
{% block title %}Verify User - FaceAuth{% endblock %}

{% block content %}
<div class="animate-fade-in">
    <div class="page-header">
        <h2 class="page-title">Face Verification</h2>
        {% if session.get('admin_logged_in') %}
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
        </a>
        {% endif %}
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="webcam-container mb-4 shadow-lg">
                <div id="loader" class="overlay-loader">
                    <div class="spinner-border text-primary" role="status" style="width: 3.5rem; height: 3.5rem;">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3 fw-bold text-primary" style="font-size: 1.2rem;">Scanning Face...</p>
                </div>
                <video id="videoElement" autoplay playsinline></video>
                <canvas id="canvasElement" style="display: none;"></canvas>
            </div>
            
            <div class="text-center">
                <button id="verifyBtn" class="btn btn-primary-custom btn-lg px-5 py-3">
                    <i class="fa-solid fa-face-viewfinder fa-xl me-2"></i> Scan & Verify
                </button>
            </div>
            
            <div id="resultBox" class="mt-4 text-center" style="display: none;">
                <div id="resultContent" class="p-4 rounded shadow-sm d-inline-block w-100" style="max-width: 500px;"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvasElement');
    const verifyBtn = document.getElementById('verifyBtn');
    const resultBox = document.getElementById('resultBox');
    const resultContent = document.getElementById('resultContent');
    const loader = document.getElementById('loader');

    // Start Webcam
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            console.error("Error accessing webcam: ", err);
            resultBox.style.display = 'block';
            resultContent.className = 'p-4 rounded border border-danger bg-danger bg-opacity-10 text-danger fw-bold';
            resultContent.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Cannot access webcam. Please allow permissions.';
        });

    verifyBtn.addEventListener('click', () => {
        // Draw video frame to canvas
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Convert to base64
        const imageData = canvas.toDataURL('image/jpeg');

        // Show Loader
        loader.classList.add('active');
        verifyBtn.disabled = true;
        resultBox.style.display = 'none';

        // Send to server
        const formData = new FormData();
        formData.append('image', imageData);

        fetch('/verify', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            loader.classList.remove('active');
            verifyBtn.disabled = false;
            resultBox.style.display = 'block';
            
            if (data.success) {
                resultContent.className = 'p-4 rounded border border-success bg-success bg-opacity-10 text-success';
                resultContent.innerHTML = `
                    <i class="fa-solid fa-circle-check fa-4x mb-3 text-success"></i>
                    <h2 class="fw-bold m-0">${data.message}</h2>
                `;
            } else {
                resultContent.className = 'p-4 rounded border border-danger bg-danger bg-opacity-10 text-danger';
                resultContent.innerHTML = `
                    <i class="fa-solid fa-circle-xmark fa-4x mb-3 text-danger"></i>
                    <h2 class="fw-bold m-0">${data.message}</h2>
                `;
            }
        })
        .catch(err => {
            console.error(err);
            loader.classList.remove('active');
            verifyBtn.disabled = false;
            resultBox.style.display = 'block';
            resultContent.className = 'p-4 rounded border border-danger bg-danger bg-opacity-10 text-danger fw-bold';
            resultContent.innerText = 'Network error occurred.';
        });
    });
</script>
{% endblock %}
