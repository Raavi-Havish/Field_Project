{% extends "base.html" %}
{% block title %}Register User - FaceAuth{% endblock %}

{% block content %}
<div class="animate-fade-in">
    <div class="page-header">
        <h2 class="page-title">Register New User</h2>
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>

    <div class="row">
        <div class="col-md-5 mb-4">
            <div class="glass-card">
                <h4 class="mb-4">User Information</h4>
                <div class="mb-4">
                    <label for="userName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="userName" placeholder="e.g., John Doe" required>
                </div>
                
                <div class="alert alert-info border-0 bg-info bg-opacity-10 text-info" style="border-radius: 8px;">
                    <i class="fa-solid fa-lightbulb me-2"></i> Ensure good lighting and look directly at the camera.
                </div>
                
                <button id="captureBtn" class="btn btn-primary-custom w-100 mt-2 py-3">
                    <i class="fa-solid fa-camera fa-lg"></i> Capture & Register
                </button>
                <div id="statusMessage" class="mt-3 text-center" style="display: none;"></div>
            </div>
        </div>
        
        <div class="col-md-7">
            <div class="webcam-container">
                <div id="loader" class="overlay-loader">
                    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3 fw-bold text-primary" style="font-size: 1.1rem;">Processing Face Data...</p>
                </div>
                <video id="videoElement" autoplay playsinline></video>
                <canvas id="canvasElement" style="display: none;"></canvas>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvasElement');
    const captureBtn = document.getElementById('captureBtn');
    const userNameInput = document.getElementById('userName');
    const statusMessage = document.getElementById('statusMessage');
    const loader = document.getElementById('loader');

    // Start Webcam
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            console.error("Error accessing webcam: ", err);
            statusMessage.style.display = 'block';
            statusMessage.className = 'mt-3 text-center text-danger fw-bold';
            statusMessage.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Cannot access webcam. Please allow permissions.';
        });

    captureBtn.addEventListener('click', () => {
        const name = userNameInput.value.trim();
        if (!name) {
            statusMessage.style.display = 'block';
            statusMessage.className = 'mt-3 text-center text-danger fw-bold p-2 bg-danger bg-opacity-10 rounded';
            statusMessage.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Please enter a name.';
            return;
        }

        // Draw video frame to canvas
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Convert to base64
        const imageData = canvas.toDataURL('image/jpeg');

        // Show Loader
        loader.classList.add('active');
        captureBtn.disabled = true;

        // Send to server
        const formData = new FormData();
        formData.append('name', name);
        formData.append('image', imageData);

        fetch('/register', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            loader.classList.remove('active');
            captureBtn.disabled = false;
            statusMessage.style.display = 'block';
            
            if (data.success) {
                statusMessage.className = 'mt-3 text-center text-success fw-bold p-3 bg-success bg-opacity-10 rounded';
                statusMessage.innerHTML = `<i class="fa-solid fa-circle-check fa-lg"></i> ${data.message}`;
                userNameInput.value = ''; // clear input
            } else {
                statusMessage.className = 'mt-3 text-center text-danger fw-bold p-3 bg-danger bg-opacity-10 rounded';
                statusMessage.innerHTML = `<i class="fa-solid fa-circle-xmark fa-lg"></i> ${data.message}`;
            }
        })
        .catch(err => {
            console.error(err);
            loader.classList.remove('active');
            captureBtn.disabled = false;
            statusMessage.style.display = 'block';
            statusMessage.className = 'mt-3 text-center text-danger fw-bold p-3 bg-danger bg-opacity-10 rounded';
            statusMessage.innerText = 'Network error occurred.';
        });
    });
</script>
{% endblock %}
